<DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NVIDIA</title>
  
    <style>
        body {
            font-family: Arial, Sans-Serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: #f0f0f0;
            line-height: 1.6;
        }
  
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .logo {
            text-align: center;
            margin: bottom 20px;
        }

        .logo img {
            width: 250px;
           max-width: 100%; 
        }

        h1 {
            color: #76b900;
            text-align: center;
        }

        h2 {
            color: #333;
            border-bottom: 2px solid #76b900;
            padding-bottom: 5px;
        }

        ul {
            padding-left: 20px;
        }

        li {
            margin: 8px 0;
        }
    </style>
</head>
<body>
    <div class="container">

           <div class="logo">
            <img src="https://1000marcas.net/wp-content/uploads/2020/03/Logo-NVIDIA.png" alt="Logo NVIDIA">
       </div>

        <h1>NVIDIA</h1>

        <h2>Descripción</h2>
        <p>
            Lider mundial en GPUs, IA y computacion grafica. 
            Fundada en 1993.
        </p>

        <h2>Productos Principales</h2>

        <ul>
            <li> GeForce RTX (Gaming)</li>
            <li> Plataformas IA (CUDA)</li>
            <li> Tarjetas Quadro(Profesional)</li>

        </ul>
    </div>
